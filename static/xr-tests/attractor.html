<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lorenz Energy Spine</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
#ui {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; align-items: center;
  background: rgba(0,0,0,.52); border: 1px solid rgba(255,255,255,.12);
  border-radius: 14px; padding: 14px 24px;
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  user-select: none;
}
label {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: rgba(255,255,255,.42); font: 600 10px/1 monospace; letter-spacing: .10em;
  text-transform: uppercase;
}
.val { color: #00ee99; font-size: 12px; }
input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 108px; height: 3px;
  background: rgba(255,255,255,.14); border-radius: 2px;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #00ee99; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 13px; height: 13px; border-radius: 50%;
  background: #00ee99; border: none; cursor: pointer;
}
#vr-btn {
  background: rgba(0,238,153,.12); border: 1px solid rgba(0,238,153,.45);
  color: #00ee99; font: 700 10px/1 monospace; letter-spacing: .12em;
  text-transform: uppercase; padding: 9px 18px; border-radius: 8px;
  cursor: pointer; transition: background .15s;
}
#vr-btn:hover { background: rgba(0,238,153,.25); }
#vr-na { color: rgba(255,255,255,.28); font: 600 10px/1 monospace; letter-spacing: .08em; text-transform: uppercase; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <label>Speed <span class="val" id="v-speed">5.0</span>
    <input type="range" id="s-speed" min="0.5" max="12.0" step="0.5" value="5.0">
  </label>
  <label>Wave <span class="val" id="v-wave">0.40</span>
    <input type="range" id="s-wave" min="0.05" max="1.50" step="0.05" value="0.40">
  </label>
  <label>Glow <span class="val" id="v-glow">1.0</span>
    <input type="range" id="s-glow" min="0.1" max="3.0" step="0.1" value="1.0">
  </label>
  <div id="vr-slot"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Lorenz attractor integration ─────────────────────────────────────────────
// The Lorenz system (sigma=10, rho=28, beta=8/3) produces a butterfly-shaped
// strange attractor. We integrate it with Euler steps, discard the transient,
// then feed the trajectory into a Catmull-Rom spline.

function buildLorenzCurve() {
  const sigma = 10, rho = 28, beta = 8 / 3, dt = 0.004;
  let x = 0.1, y = 0, z = 20;

  // Burn off transient — system needs ~8 time units to settle onto the attractor
  for (let i = 0; i < 2000; i++) {
    x += sigma * (y - x) * dt;
    y += (x * (rho - z) - y) * dt;
    z += (x * y - beta * z) * dt;
  }

  const pts = [];
  for (let i = 0; i < 8000; i++) {
    x += sigma * (y - x) * dt;
    y += (x * (rho - z) - y) * dt;
    z += (x * y - beta * z) * dt;
    // Remap: Lorenz z (height, 0-50) -> Three.js Y (up)
    if (i % 2 === 0) pts.push(new THREE.Vector3(x, z, y));
  }

  // Center and scale to ~6 units across so VR fills a room
  const box = new THREE.Box3().setFromPoints(pts);
  const center = new THREE.Vector3();
  box.getCenter(center);
  const span = box.getSize(new THREE.Vector3());
  const scale = 6 / Math.max(span.x, span.y, span.z);
  pts.forEach(p => p.sub(center).multiplyScalar(scale));

  return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
}

// ── Vertex shader ─────────────────────────────────────────────────────────────
const VERT = /* glsl */`
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;

  void main() {
    vUv    = uv;
    vNormal = normalize(normalMatrix * normal);
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// ── Core tube shader ──────────────────────────────────────────────────────────
// Techniques from martingrahn-cmd/slipstream-vector:
//
// Energy spine: a sine wave races along the arc-length of the tube.
//   vUv.y runs 0→1 along the tube; multiply by uLen to get actual distance.
//   sin(distance * frequency - time * speed) → wave moving along the tube.
//
// Scan pulse: discrete bright packet using fract().
//   fract(d / interval - time * speed) gives a 0→1 sawtooth repeating every
//   'interval' units. Invert and clamp to get a sharp leading-edge packet.
//
// Expansion joints: dark seams via step(fract(d / period), threshold).
//
// Rim glow: dot(normal, viewDir) approaches 0 at the tube's edge.
//   Power-curve the (1 - dot) to get a glowing rim — no lights, no post bloom.

const CORE_FRAG = /* glsl */`
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;

  uniform float uTime;
  uniform float uLen;
  uniform float uSpeed;
  uniform float uWave;
  uniform vec3  uColorA;
  uniform vec3  uColorB;
  uniform float uDir;
  uniform float uFreq;

  void main() {
    float d = vUv.y * uLen;  // arc-length proxy along tube

    // Energy spine
    float spine = sin(d * uWave - uTime * uSpeed * uDir * uFreq);
    spine = spine * 0.5 + 0.5;
    spine = pow(spine, 2.0);

    // Scan pulse packet
    float sp   = fract(d / 20.0 - uTime * uSpeed * 0.044 * uDir * uFreq);
    float scan = pow(max(0.0, 1.0 - sp * 14.0), 1.5);

    // Expansion joints (dark seams)
    float joint = 1.0 - step(fract(d / 12.0), 0.05) * 0.75;

    // Subtle rhythm bands
    float band = step(fract(d / 5.0), 0.12) * 0.10;

    // Fresnel-style rim glow
    float rim = pow(1.0 - max(0.0, dot(vNormal, vViewDir)), 2.5);

    // Color drifts between A and B along length + slowly over time
    float h = sin(d * 0.012 + uTime * 0.07) * 0.5 + 0.5;
    vec3 col = mix(uColorA, uColorB, h);

    vec3 result = col * (0.08 + spine * 0.5 + band);
    result += uColorA * scan * 2.0;
    result += col * rim * 0.7;
    result *= joint;

    gl_FragColor = vec4(result, 1.0);
  }
`;

// ── Glow halo shader ──────────────────────────────────────────────────────────
// A wider tube around the core rendered with additive blending.
// This is slipstream's geometry-backed glow trick: instead of a post-processing
// bloom filter (which blurs everything), an extra mesh gives a sharp-core soft-halo
// appearance that reads cleanly even when pulses are moving fast.

const GLOW_FRAG = /* glsl */`
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewDir;

  uniform float uTime;
  uniform float uLen;
  uniform float uSpeed;
  uniform float uWave;
  uniform float uGlowScale;
  uniform vec3  uColorA;
  uniform vec3  uColorB;

  void main() {
    float d = vUv.y * uLen;

    float spine = sin(d * uWave - uTime * uSpeed) * 0.5 + 0.5;
    float scan  = pow(max(0.0, 1.0 - fract(d / 20.0 - uTime * uSpeed * 0.044) * 14.0), 1.5);
    float rim   = pow(1.0 - max(0.0, dot(vNormal, vViewDir)), 3.0);

    float h = sin(d * 0.012 + uTime * 0.07) * 0.5 + 0.5;
    vec3 col = mix(uColorA, uColorB, h);

    float a = (spine * 0.10 + scan * 0.28 + rim * 0.22) * 0.20 * uGlowScale;
    gl_FragColor = vec4(col, a);
  }
`;

// ── Scene setup ───────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.NoToneMapping;
renderer.xr.enabled  = true;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000408);
scene.fog        = new THREE.FogExp2(0x000408, 0.025);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 200);
camera.position.set(6, 3, 9);  // angled to avoid the boring face-on infinity view

// Player rig: moving this shifts the VR viewpoint. Camera sits inside it so XR
// head-tracking is applied on top of the rig's world position.
const rig = new THREE.Group();
scene.add(rig);
rig.add(camera);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping   = true;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.6;

// Controller pointer rays (visible in VR)
const _rayGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-2)]);
const _rayMat = new THREE.LineBasicMaterial({ color: 0x00ee99, transparent: true, opacity: 0.5 });
[0, 1].forEach(i => { const c = renderer.xr.getController(i); c.add(new THREE.Line(_rayGeo, _rayMat)); scene.add(c); });

// ── Slider state ──────────────────────────────────────────────────────────────
const state = { speed: 5.0, wave: 0.40, glow: 1.0 };
[
  ['s-speed', 'v-speed', 'speed', 1],
  ['s-wave',  'v-wave',  'wave',  2],
  ['s-glow',  'v-glow',  'glow',  1],
].forEach(([sid, vid, key, dec]) => {
  const sl = document.getElementById(sid);
  const vl = document.getElementById(vid);
  sl.addEventListener('input', () => {
    state[key] = parseFloat(sl.value);
    vl.textContent = state[key].toFixed(dec);
  });
});

// ── Build geometry ────────────────────────────────────────────────────────────
const curve    = buildLorenzCurve();
const curveLen = curve.getLength();

// Main core tube
const coreGeo = new THREE.TubeGeometry(curve, 5000, 0.04, 8, false);
const coreMat = new THREE.ShaderMaterial({
  vertexShader: VERT, fragmentShader: CORE_FRAG,
  uniforms: {
    uTime:   { value: 0 },  uLen:    { value: curveLen },
    uSpeed:  { value: 5.0 }, uWave:   { value: 0.40 },
    uColorA: { value: new THREE.Color(0x00ffff) },
    uColorB: { value: new THREE.Color(0xff00ff) },
    uDir:    { value: 1.0 }, uFreq:   { value: 1.0 },
  },
  side: THREE.DoubleSide,
});
scene.add(new THREE.Mesh(coreGeo, coreMat));

// Glow halo (geometry-backed bloom)
const glowGeo = new THREE.TubeGeometry(curve, 1500, 0.18, 6, false);
const glowMat = new THREE.ShaderMaterial({
  vertexShader: VERT, fragmentShader: GLOW_FRAG,
  uniforms: {
    uTime:      { value: 0 },  uLen:       { value: curveLen },
    uSpeed:     { value: 5.0 }, uWave:      { value: 0.40 },
    uGlowScale: { value: 1.0 },
    uColorA:    { value: new THREE.Color(0x00ffff) },
    uColorB:    { value: new THREE.Color(0xff00ff) },
  },
  transparent: true, blending: THREE.AdditiveBlending,
  depthWrite: false,  side: THREE.DoubleSide,
});
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Counter-pulse tube: opposite direction, golden-ratio frequency offset, different palette.
// This is the seed of Effect 2 — pulses traveling in opposing directions on the
// same path will later become the interference pattern.
const revGeo = new THREE.TubeGeometry(curve, 3500, 0.026, 6, false);
const revMat = new THREE.ShaderMaterial({
  vertexShader: VERT, fragmentShader: CORE_FRAG,
  uniforms: {
    uTime:   { value: 0 },  uLen:    { value: curveLen },
    uSpeed:  { value: 5.0 }, uWave:   { value: 0.40 },
    uColorA: { value: new THREE.Color(0xff6600) },
    uColorB: { value: new THREE.Color(0x8800ff) },
    uDir:    { value: -1.0 }, uFreq: { value: 1.6180339887 },
  },
  transparent: true, blending: THREE.AdditiveBlending,
  depthWrite: false,  side: THREE.BackSide,
});
scene.add(new THREE.Mesh(revGeo, revMat));

const allMats = [coreMat, glowMat, revMat];

// ── WebXR ─────────────────────────────────────────────────────────────────────
(async () => {
  const slot = document.getElementById('vr-slot');
  if (!navigator.xr) { slot.innerHTML = '<span id="vr-na">VR not available</span>'; return; }
  const ok = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  if (!ok) { slot.innerHTML = '<span id="vr-na">VR not available</span>'; return; }

  const btn = document.createElement('button');
  btn.id = 'vr-btn';
  btn.textContent = 'Enter VR';
  slot.appendChild(btn);

  btn.addEventListener('click', async () => {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor'],
    });
    btn.textContent = 'Exit VR';
    session.addEventListener('end', () => { btn.textContent = 'Enter VR'; });
    await renderer.xr.setSession(session);
  });
})();

// ── Animation loop ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let _prevT = 0, _snapCD = false, _prevA = false, _prevB = false;

renderer.setAnimationLoop(() => {
  const t  = clock.getElapsedTime();
  const dt = t - _prevT;
  _prevT   = t;

  allMats.forEach(m => {
    m.uniforms.uTime.value  = t;
    m.uniforms.uSpeed.value = state.speed;
    m.uniforms.uWave.value  = state.wave;
  });
  glowMat.uniforms.uGlowScale.value = state.glow;

  if (!renderer.xr.isPresenting) {
    controls.update();
  } else {
    // Quest 2/3 controller input
    // Left stick: fly (forward/strafe). Right stick X: snap-turn 45 deg.
    // A button: speed up. B button: slow down.
    const session = renderer.xr.getSession();
    if (session) {
      for (const src of session.inputSources) {
        if (!src.gamepad) continue;
        const ax = src.gamepad.axes;
        const bt = src.gamepad.buttons;
        if (src.handedness === 'left') {
          const lx = Math.abs(ax[0]) > 0.12 ? ax[0] : 0;
          const ly = Math.abs(ax[1]) > 0.12 ? ax[1] : 0;
          if (lx || ly) {
            const fwd = new THREE.Vector3();
            renderer.xr.getCamera().getWorldDirection(fwd);
            fwd.y = 0;
            if (fwd.lengthSq() < 0.001) fwd.set(0, 0, -1);
            fwd.normalize();
            const rgt = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0));
            rig.position.addScaledVector(fwd, -ly * dt * 3);
            rig.position.addScaledVector(rgt,  lx * dt * 3);
          }
        }
        if (src.handedness === 'right') {
          const rx = ax[0];
          if (Math.abs(rx) > 0.7 && !_snapCD) {
            rig.rotateY(-Math.sign(rx) * Math.PI / 4);
            _snapCD = true;
          } else if (Math.abs(rx) < 0.3) {
            _snapCD = false;
          }
          const a = bt[4]?.pressed, b = bt[5]?.pressed;
          if (a && !_prevA) state.speed = Math.min(12, state.speed + 0.5);
          if (b && !_prevB) state.speed = Math.max(0.5, state.speed - 0.5);
          _prevA = !!a; _prevB = !!b;
        }
      }
    }
  }

  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
